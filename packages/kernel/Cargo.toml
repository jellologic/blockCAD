[package]
name = "blockcad-kernel"
version = "0.1.0"
edition = "2021"
description = "Parametric CAD kernel for blockCAD"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "blockcad-server"
path = "src/bin/server.rs"
required-features = ["server"]

[features]
default = ["client", "parallel"]
client = []
server = ["client"]
parallel = ["rayon"]
wasm = ["wasm-bindgen", "js-sys", "web-sys", "console_error_panic_hook"]

[dependencies]
nalgebra = { version = "0.33", default-features = false, features = ["std", "serde-serialize"] }
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
faer = { version = "0.19", default-features = false, features = ["std"] }
bytemuck = { version = "1.14", features = ["derive"] }
rayon = { version = "1.10", optional = true }

# Export formats
zip = { version = "2", default-features = false, features = ["deflate-miniz"] }
quick-xml = "0.37"
gltf-json = "1"

# WASM bindings (feature-gated)
wasm-bindgen = { version = "0.2", optional = true }
js-sys = { version = "0.3", optional = true }
web-sys = { version = "0.3", optional = true, features = ["console"] }
console_error_panic_hook = { version = "0.1", optional = true }

[dev-dependencies]
approx = "0.5"
wasm-bindgen-test = "0.3"
stl_io = "0.7"    # Third-party STL parser for export validation
tobj = "4"         # Third-party OBJ parser for export validation
gltf = "1"         # Khronos glTF/GLB parser for export validation
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "tessellation"
harness = false

[[bench]]
name = "evaluation"
harness = false

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
inherits = "release"
